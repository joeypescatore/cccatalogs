<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Film</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="carousel-wrap">
    <div class="carousel-fade carousel-fade--left" aria-hidden="true"></div>
    <div class="carousel" id="carousel" aria-label="Film photos"></div>
    <div class="carousel-fade carousel-fade--right" aria-hidden="true"></div>
  </main>

  <footer class="controls">
    <button class="export-btn" id="exportBtn" type="button">Save Image</button>

    <div class="ticker-wrap">
      <div class="ticker-viewport">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
    </div>

    <div class="date-display" id="dateDisplay">
      <span class="date-month" id="dateMonth"></span>
      <span class="date-year" id="dateYear"></span>
    </div>
  </footer>

  <script src="app.js" type="module"></script>
</body>
</html>
